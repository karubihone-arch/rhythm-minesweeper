<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ダンジョン マインスイーパー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #581c87 50%, #831843 100%);
            min-height: 100vh;
            touch-action: manipulation;
        }
        #app {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container { max-width: 96rem; width: 100%; }
        .header { text-align: center; margin-bottom: 1.5rem; }
        .title { font-size: 2.5rem; font-weight: bold; color: white; margin-bottom: 0.5rem; }
        .subtitle { color: #e9d5ff; font-size: 1rem; }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .start-btn {
            background: linear-gradient(to right, #a855f7, #ec4899);
            color: white;
            padding: 1.5rem 3rem;
            border-radius: 0.75rem;
            font-weight: bold;
            font-size: 1.3rem;
            border: none;
            cursor: pointer;
            display: block;
            margin: 0 auto;
        }
        .start-btn:active { transform: scale(0.95); }
        .status-bar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .status-content { display: flex; justify-content: space-around; color: white; }
        .status-item { text-align: center; }
        .status-label { font-size: 0.75rem; color: #e9d5ff; }
        .status-value { font-size: 1.3rem; font-weight: bold; margin-top: 0.25rem; }
        .board-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            border-radius: 1rem;
            padding: 1rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .board-grid { display: grid; gap: 2px; margin: 0 auto; }
        .cell {
            width: 1.8rem;
            height: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
            border: none;
            cursor: pointer;
            border-radius: 3px;
            user-select: none;
        }
        .cell-hidden {
            background: linear-gradient(135deg, #a78bfa, #f472b6);
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.15);
        }
        .cell-hidden:active {
            transform: scale(0.9);
            background: linear-gradient(135deg, #c4b5fd, #f9a8d4);
        }
        .cell-revealed-mine { background: #dc2626; color: white; }
        .cell-revealed-empty { background: #374151; }
        .cell-revealed-number { background: #1f2937; color: white; }
        .cell-revealed-stairs {
            background: linear-gradient(135deg, #fbbf24, #fb923c);
            font-size: 1.2rem;
            animation: stairs-glow 0.5s ease-out;
        }
        @keyframes stairs-glow {
            0% { transform: scale(1.5); box-shadow: 0 0 30px #fbbf24; }
            100% { transform: scale(1); }
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        .modal {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            max-width: 20rem;
            text-align: center;
        }
        .modal-emoji { font-size: 4rem; margin-bottom: 1rem; }
        .modal-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 0.5rem; }
        .modal-text { font-size: 1rem; color: #4b5563; margin-bottom: 1rem; }
        .modal-score { font-weight: bold; color: #9333ea; font-size: 1.3rem; }
        .modal-btn {
            background: linear-gradient(to right, #a855f7, #ec4899);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            width: 100%;
        }
        .hidden { display: none; }
        .instructions {
            margin-top: 1.5rem;
            text-align: center;
            color: #e9d5ff;
            font-size: 0.9rem;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <div class="header">
                <h1 class="title">🏰 ダンジョン マインスイーパー</h1>
                <p class="subtitle">階段を見つけて深く潜れ</p>
            </div>

            <div id="menu-screen" class="card">
                <button class="start-btn" onclick="startGame()">🎮 冒険を始める</button>
                <div class="instructions">
                    <p>⚡ マスを開いて階段（🪜）を探す</p>
                    <p>💣 地雷を踏んだらゲームオーバー</p>
                    <p>📊 深く潜るほど難易度UP</p>
                    <p>🏆 最深階層を目指せ！</p>
                </div>
            </div>

            <div id="game-screen" class="hidden">
                <div class="status-bar">
                    <div class="status-content">
                        <div class="status-item">
                            <div class="status-label">現在の階層</div>
                            <div class="status-value" id="floor">1F</div>
                        </div>
                        <div class="status-item">
                            <div class="status-label">盤面サイズ</div>
                            <div class="status-value" id="size">9×9</div>
                        </div>
                        <div class="status-item">
                            <div class="status-label">地雷数</div>
                            <div class="status-value" id="mines">5</div>
                        </div>
                    </div>
                </div>

                <div class="board-container">
                    <div id="board" class="board-grid"></div>
                </div>
            </div>

            <div id="modal" class="modal-overlay hidden">
                <div class="modal">
                    <div class="modal-emoji" id="modal-emoji">💀</div>
                    <h2 class="modal-title" id="modal-title">ゲームオーバー</h2>
                    <p class="modal-text">
                        最深到達階層<br>
                        <span class="modal-score" id="modal-score">1F</span>
                    </p>
                    <button class="modal-btn" onclick="restart()">もう一度挑戦</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let gameState = {
            floor: 1,
            board: [],
            revealed: new Set(),
            stairsPos: null,
            stairsRevealed: false,
            clickCount: 0,
            config: null
        };

        function getFloorConfig(floor) {
            // 5階建てダンジョン
            if (floor === 1) {
                return { rows: 9, cols: 9, mines: 5, name: '初級' };
            } else if (floor === 2) {
                return { rows: 10, cols: 10, mines: 10, name: '初中級' };
            } else if (floor === 3) {
                return { rows: 12, cols: 12, mines: 20, name: '中級' };
            } else if (floor === 4) {
                return { rows: 14, cols: 14, mines: 30, name: '中上級' };
            } else if (floor === 5) {
                return { rows: 16, cols: 16, mines: 40, name: '上級（最終階）', isFinal: true };
            }
        }

        function generateBoard(config) {
            const { rows, cols, mines, isFinal } = config;
            const board = Array(rows).fill(null).map(() => Array(cols).fill(0));
            
            // 地雷配置
            let placed = 0;
            while (placed < mines) {
                const r = Math.floor(Math.random() * rows);
                const c = Math.floor(Math.random() * cols);
                if (board[r][c] === 0) {
                    board[r][c] = -1; // -1 = 地雷
                    placed++;
                }
            }

            // 数字計算
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (board[r][c] !== -1) {
                        let count = 0;
                        for (let dr = -1; dr <= 1; dr++) {
                            for (let dc = -1; dc <= 1; dc++) {
                                const nr = r + dr, nc = c + dc;
                                if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc] === -1) {
                                    count++;
                                }
                            }
                        }
                        board[r][c] = count;
                    }
                }
            }
            
            // 最終階以外は階段を配置
            if (!isFinal) {
                const numberedPositions = [];
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (board[r][c] > 0) {
                            numberedPositions.push([r, c]);
                        }
                    }
                }
                
                if (numberedPositions.length > 0) {
                    const stairsIdx = Math.floor(Math.random() * numberedPositions.length);
                    const [stairsRow, stairsCol] = numberedPositions[stairsIdx];
                    board[stairsRow][stairsCol] = -2; // -2 = 階段
                    gameState.stairsPos = `${stairsRow},${stairsCol}`;
                } else {
                    gameState.stairsPos = null;
                }
            } else {
                gameState.stairsPos = null; // 最終階は階段なし
            }

            return board;
        }

        function renderBoard() {
            const config = gameState.config;
            const boardEl = document.getElementById('board');
            boardEl.style.gridTemplateColumns = `repeat(${config.cols}, 1.8rem)`;
            boardEl.innerHTML = '';

            for (let r = 0; r < config.rows; r++) {
                for (let c = 0; c < config.cols; c++) {
                    const cell = document.createElement('button');
                    cell.className = 'cell cell-hidden';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.onmousedown = (e) => {
                        if (e.button === 0) {
                            e.preventDefault();
                            handleClick(r, c);
                        }
                    };
                    cell.ontouchstart = (e) => {
                        e.preventDefault();
                        handleClick(r, c);
                    };
                    boardEl.appendChild(cell);
                }
            }
        }

        function updateCell(row, col) {
            const key = `${row},${col}`;
            const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
            if (!cell) return;

            cell.className = 'cell';
            
            if (gameState.revealed.has(key)) {
                const value = gameState.board[row][col];
                if (value === -1) {
                    cell.className += ' cell-revealed-mine';
                    cell.innerHTML = '💣';
                } else if (value === -2) {
                    // 階段！（サプライズ）
                    cell.className += ' cell-revealed-stairs';
                    cell.innerHTML = '🪜';
                } else if (value === 0) {
                    cell.className += ' cell-revealed-empty';
                    cell.innerHTML = '';
                } else {
                    cell.className += ' cell-revealed-number';
                    cell.innerHTML = value;
                }
            } else {
                cell.className += ' cell-hidden';
                cell.innerHTML = '';
                
                // 階段マスを爆弾アイコンで表示（ヒント）
                if (gameState.stairsPos === key && gameState.showMineHints) {
                    // 地雷数カウント時には見えないので、ヒントなし
                }
            }
        }

        function handleClick(row, col) {
            const key = `${row},${col}`;
            if (gameState.revealed.has(key)) return;

            gameState.revealed.add(key);
            const value = gameState.board[row][col];

            if (value === -1) {
                // 地雷を踏んだ
                updateCell(row, col);
                gameOver();
                return;
            }

            if (value === -2) {
                // 階段発見！
                updateCell(row, col);
                setTimeout(() => nextFloor(), 500);
                return;
            }

            // 0の場合は周辺展開
            if (value === 0) {
                const config = gameState.config;
                const toReveal = [[row, col]];
                const cellsToUpdate = [];

                while (toReveal.length > 0) {
                    const [r, c] = toReveal.pop();
                    if (cellsToUpdate.some(([cr, cc]) => cr === r && cc === c)) continue;
                    cellsToUpdate.push([r, c]);

                    if (gameState.board[r][c] === 0) {
                        for (let dr = -1; dr <= 1; dr++) {
                            for (let dc = -1; dc <= 1; dc++) {
                                const nr = r + dr, nc = c + dc;
                                const nKey = `${nr},${nc}`;
                                if (nr >= 0 && nr < config.rows && nc >= 0 && nc < config.cols && 
                                    !gameState.revealed.has(nKey)) {
                                    // 階段マスはrevealedに追加しない（クリック可能のまま）
                                    if (gameState.board[nr][nc] !== -2) {
                                        gameState.revealed.add(nKey);
                                        toReveal.push([nr, nc]);
                                    }
                                }
                            }
                        }
                    }
                }

                cellsToUpdate.forEach(([r, c]) => updateCell(r, c));
            } else {
                updateCell(row, col);
            }
            
            // 最終階で全マス開けたかチェック
            if (gameState.config.isFinal) {
                checkVictory();
            }
        }
        
        function checkVictory() {
            const { rows, cols, mines } = gameState.config;
            const totalCells = rows * cols;
            const safeCells = totalCells - mines;
            
            if (gameState.revealed.size >= safeCells) {
                // 勝利！
                setTimeout(() => {
                    document.getElementById('modal-emoji').textContent = '🎉';
                    document.getElementById('modal-title').textContent = 'ダンジョン制覇！';
                    document.getElementById('modal-score').textContent = 'おめでとう！';
                    document.getElementById('modal').classList.remove('hidden');
                }, 300);
            }
        }

        function nextFloor() {
            gameState.floor++;
            gameState.revealed = new Set();
            gameState.clickCount = 0;
            gameState.stairsRevealed = false;
            gameState.config = getFloorConfig(gameState.floor);
            gameState.board = generateBoard(gameState.config);

            document.getElementById('floor').textContent = `${gameState.floor}F`;
            document.getElementById('size').textContent = `${gameState.config.rows}×${gameState.config.cols}`;
            document.getElementById('mines').textContent = gameState.config.mines;

            renderBoard();
        }

        function gameOver() {
            document.getElementById('modal-emoji').textContent = '💀';
            document.getElementById('modal-title').textContent = 'ゲームオーバー';
            document.getElementById('modal-score').textContent = `${gameState.floor}F`;
            document.getElementById('modal').classList.remove('hidden');
        }

        function startGame() {
            gameState.floor = 1;
            gameState.revealed = new Set();
            gameState.clickCount = 0;
            gameState.stairsRevealed = false;
            gameState.config = getFloorConfig(1);
            gameState.board = generateBoard(gameState.config);

            document.getElementById('floor').textContent = '1F';
            document.getElementById('size').textContent = `${gameState.config.rows}×${gameState.config.cols}`;
            document.getElementById('mines').textContent = gameState.config.mines;

            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            renderBoard();
        }

        function restart() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
